name: Test

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.sha }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-24.04
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Install pixi
        uses: prefix-dev/setup-pixi@5185adfbffb4bd703da3010310260805d89ebb11  # v0.9.6
        with:
          pixi-version: v0.63.2
          locked: true

      - name: Cache pixi environments
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae  # v5
        with:
          path: |
            .pixi
            ~/.cache/rattler/cache
          key: pixi-${{ runner.os }}-${{ hashFiles('pixi.lock') }}
          restore-keys: |
            pixi-${{ runner.os }}-

      - name: Lint check
        run: pixi run ruff check hephaestus scripts tests

      - name: Format check
        run: pixi run ruff format --check hephaestus scripts tests

      - name: Type check
        run: pixi run mypy

  test:
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        # macOS and Windows are tracked separately in #539 — the test suite is
        # mostly Linux-pinned (paths, file modes, curses, fcntl) and the
        # cross-OS port is a multi-session effort, not blocking 1.0. The
        # runtime fixes already in place (#533/#534/#536/#537/#538) stay.
        os: [ubuntu-latest]
        python-version: ["3.10", "3.11", "3.12", "3.13"]
        test-type: [unit, integration]
    # `shell: bash` is harmless on ubuntu and keeps the matrix re-expansion
    # trivial once #539 is picked up.
    defaults:
      run:
        shell: bash

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Cache pip packages
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae  # v5
        with:
          path: ~/.cache/pip
          key: pip-${{ runner.os }}-${{ matrix.python-version }}-${{ hashFiles('pyproject.toml') }}
          restore-keys: |
            pip-${{ runner.os }}-${{ matrix.python-version }}-

      - name: Install package
        run: pip install -e ".[dev,schema]"

      - name: Run unit tests
        if: matrix.test-type == 'unit'
        run: pytest tests/unit --override-ini="addopts=" -v --strict-markers --cov=hephaestus --cov-report=term-missing --cov-report=xml --cov-fail-under=80

      - name: Check unit test structure
        if: matrix.test-type == 'unit'
        # Use the strict CLI (also flags loose test_*.py files at tests/unit/ root).
        run: hephaestus-check-test-structure

      - name: Check per-module coverage floors
        if: matrix.test-type == 'unit'
        run: pip install -e ".[xml]" && hephaestus-check-coverage --coverage-file coverage.xml --config coverage.toml

      - name: Run integration tests
        if: matrix.test-type == 'integration'
        run: |
          pytest tests/integration --override-ini="addopts=" -v --strict-markers

      - name: Build wheel smoke test
        if: matrix.test-type == 'integration'
        run: |
          python -m build
          pip install dist/homericintelligence_hephaestus-*.whl --force-reinstall
          python -c "import hephaestus; print('Package version:', hephaestus.__version__)"
          python -c "from hephaestus import slugify, retry_with_backoff, setup_logging; print('OK')"

      - name: Upload coverage
        if: matrix.test-type == 'unit' && matrix.python-version == '3.12'
        uses: codecov/codecov-action@e79a6962e0d4c0c17b229090214935d2e33f8354  # v6
        with:
          files: ./coverage.xml
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: false
          flags: unit
