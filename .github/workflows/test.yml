name: Test

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.sha }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-24.04
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Cache pip packages
        uses: actions/cache@v5
        with:
          path: ~/.cache/pip
          key: pip-lint-${{ runner.os }}-${{ hashFiles('pyproject.toml') }}
          restore-keys: |
            pip-lint-${{ runner.os }}-

      - name: Install package
        run: pip install -e ".[dev]"

      - name: Lint check
        run: ruff check hephaestus scripts tests

      - name: Format check
        run: ruff format --check hephaestus scripts tests

  test:
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]
        test-type: [unit, integration]

    steps:
      - uses: actions/checkout@v6

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Cache pip packages
        uses: actions/cache@v5
        with:
          path: ~/.cache/pip
          key: pip-${{ runner.os }}-${{ matrix.python-version }}-${{ hashFiles('pyproject.toml') }}
          restore-keys: |
            pip-${{ runner.os }}-${{ matrix.python-version }}-

      - name: Install package
        run: pip install -e ".[dev]"

      - name: Run unit tests
        if: matrix.test-type == 'unit'
        run: pytest tests/unit --override-ini="addopts=" -v --strict-markers --cov=hephaestus --cov-report=term-missing --cov-report=xml
        shell: bash

      - name: Check unit test structure
        if: matrix.test-type == 'unit'
        run: python scripts/check_unit_test_structure.py

      - name: Run integration tests
        if: matrix.test-type == 'integration'
        run: |
          pytest tests/integration --override-ini="addopts=" -v --strict-markers

      - name: Build wheel smoke test
        if: matrix.test-type == 'integration'
        run: |
          python -m build
          pip install dist/homericintelligence_hephaestus-*.whl --force-reinstall
          python -c "import hephaestus; print('Package version:', hephaestus.__version__)"
          python -c "from hephaestus import slugify, retry_with_backoff, setup_logging; print('OK')"

      - name: Upload coverage
        if: matrix.test-type == 'unit' && matrix.python-version == '3.13'
        uses: codecov/codecov-action@v5
        with:
          files: ./coverage.xml
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: false
          flags: unit
