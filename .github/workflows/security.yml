name: Security

on:
  pull_request:
    paths:
      - "pixi.toml"
      - "pixi.lock"
      - "pyproject.toml"
      - "NOTICE"
      - "**/*.py"
      - ".github/workflows/security.yml"
  schedule:
    - cron: "0 8 * * 1"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  pip-audit:
    name: Dependency vulnerability scan
    # PR-time pip-audit runs in _required.yml (security/dependency-scan). Skip
    # here on PRs to avoid the ~2x duplicate run; still runs on the weekly
    # schedule + manual dispatch. See issue #1182.
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-24.04
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0

      - name: Install pixi
        uses: prefix-dev/setup-pixi@5185adfbffb4bd703da3010310260805d89ebb11  # v0.9.6
        with:
          pixi-version: v0.69.0
          environments: lint
          locked: true
          # setup-pixi already caches `.pixi` keyed exactly on the pixi.lock
          # hash. A second actions/cache step over `.pixi` restored a STALE env
          # (saved by an earlier poisoned run under the same exact key) on top
          # of this --locked install, downgrading urllib3 2.7.0 -> 2.6.3 so
          # pip-audit failed against an already-patched lock. Do not add one.

      - name: Run pip-audit
        id: pip-audit
        run: pixi run --environment lint pip-audit

      - name: Post pip-audit summary
        if: always()
        env:
          AUDIT_OUTCOME: ${{ steps.pip-audit.outcome }}
        run: |
          {
            echo "## pip-audit Security Scan"
            echo ""
            if [ "$AUDIT_OUTCOME" = "success" ]; then
              echo "No HIGH/CRITICAL vulnerabilities found."
            else
              echo "Vulnerabilities detected — see job logs for details."
            fi
          } >> "$GITHUB_STEP_SUMMARY"

  sast:
    name: Static Application Security Testing
    # PR-time SAST runs in _required.yml (security/sast-scan). Skip here on PRs
    # to avoid the ~2x duplicate run; still runs on the weekly schedule +
    # manual dispatch. See issue #1182.
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-24.04
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0

      - name: Install pixi
        uses: prefix-dev/setup-pixi@5185adfbffb4bd703da3010310260805d89ebb11  # v0.9.6
        with:
          pixi-version: v0.69.0
          environments: lint
          locked: true
          # setup-pixi already caches `.pixi` keyed exactly on the pixi.lock
          # hash. A second actions/cache step over `.pixi` restored a STALE env
          # (saved by an earlier poisoned run under the same exact key) on top
          # of this --locked install, downgrading urllib3 2.7.0 -> 2.6.3 so
          # pip-audit failed against an already-patched lock. Do not add one.

      - name: Run bandit (SAST)
        id: bandit
        run: pixi run --environment lint sast

      - name: Post bandit summary
        if: always()
        env:
          BANDIT_OUTCOME: ${{ steps.bandit.outcome }}
        run: |
          {
            echo "## Bandit Static Application Security Testing"
            echo ""
            if [ "$BANDIT_OUTCOME" = "success" ]; then
              echo "No security issues found."
            else
              echo "Security issues detected — see job logs for details."
            fi
          } >> "$GITHUB_STEP_SUMMARY"

  license-scan:
    name: License compatibility scan
    runs-on: ubuntu-24.04
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          fetch-depth: 0  # hatch-vcs needs full history to compute the version

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6
        with:
          python-version: "3.13"
          cache: pip  # cache wheels so a PyPI hiccup does not flake the gate

      # Install the package + ALL runtime extras (with deps) on a bare runner,
      # exactly like the unit-test jobs (test.yml). NOT inside pixi: pip and
      # pixi co-managing site-packages causes lockfile churn (pixi.toml).
      - name: Install package with all runtime extras
        run: pip install -e ".[all]"

      - name: Run license scan
        id: license-scan
        env:
          GITHUB_EVENT_NAME: ${{ github.event_name }}
        run: python3 scripts/check_license_compatibility.py

      - name: Post license-scan summary
        if: always()
        env:
          LICENSE_OUTCOME: ${{ steps.license-scan.outcome }}
        run: |
          {
            echo "## License Compatibility Scan"
            echo ""
            if [ "$LICENSE_OUTCOME" = "success" ]; then
              echo "All distributed dependency licenses compatible with BSD-3-Clause (see NOTICE)."
            else
              echo "Non-compatible license or coverage gap detected — see job logs and NOTICE."
            fi
          } >> "$GITHUB_STEP_SUMMARY"
