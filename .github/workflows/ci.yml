name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    name: Test Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.8", "3.9", "3.10", "3.11", "3.12"]

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}

    - name: Cache pip packages
      uses: actions/cache@v4
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements*.txt', 'setup.py') }}
        restore-keys: |
          ${{ runner.os }}-pip-

    - name: Install Pixi
      uses: prefix-dev/setup-pixi@v0.4.1
      with:
        pixi-version: latest

    - name: Install dependencies
      run: pixi install

    - name: Run tests with pytest
      run: pixi run pytest tests/ -v --tb=short --color=yes

    - name: Test import
      run: pixi run python -c "import hephaestus; print(f'Hephaestus version: {hephaestus.__version__}')"

  lint:
    name: Lint and Type Check
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.11"

    - name: Install Pixi
      uses: prefix-dev/setup-pixi@v0.4.1
      with:
        pixi-version: latest

    - name: Install dependencies
      run: pixi install

    - name: Lint with flake8
      run: |
        # stop the build if there are Python syntax errors or undefined names
        pixi run flake8 hephaestus --count --select=E9,F63,F7,F82 --show-source --statistics
        # exit-zero treats all errors as warnings
        pixi run flake8 hephaestus --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics

    - name: Check formatting with black
      run: pixi run black --check hephaestus tests

    - name: Type check with mypy
      run: pixi run mypy hephaestus --ignore-missing-imports
      continue-on-error: true

  coverage:
    name: Test Coverage
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.11"

    - name: Install Pixi
      uses: prefix-dev/setup-pixi@v0.4.1
      with:
        pixi-version: latest

    - name: Install dependencies
      run: pixi install

    - name: Run tests with coverage
      run: pixi run pytest tests/ --cov=hephaestus --cov-report=term-missing --cov-report=xml

    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v4
      with:
        file: ./coverage.xml
        fail_ci_if_error: false
      continue-on-error: true
