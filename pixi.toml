[workspace]
name = "project-hephaestus"
description = "Shared utilities and tooling for the HomericIntelligence ecosystem"
channels = ["conda-forge"]
platforms = ["linux-64"] # Do not re-enable, "win-64", "osx-64", "osx-arm64"]
requires-pixi = ">=0.69.0"

[tasks]
test = "pytest"
test-shell = "bats --recursive tests/shell"
lint = "ruff check hephaestus scripts tests"
format = "ruff format hephaestus scripts tests"
mypy = "mypy hephaestus/ scripts/ tests/"
# Scoped to the package only; consumed by `just typecheck` so the justfile
# recipe does not double-scan by appending `hephaestus` to the default
# `mypy` task's argument list.
mypy-pkg = "mypy hephaestus/"
audit = "pixi run --environment lint pip-audit"
docs = "pdoc hephaestus --output-dir docs/api"
# Editable install of this package into the pixi environment, for local dev
# that imports `hephaestus` at runtime. Run once after `pixi install`:
#   pixi run dev-install
# The package is intentionally NOT a [pypi-dependencies] entry: as an editable
# path dependency with a hatch-vcs dynamic version, Pixi re-resolved its version
# (from `git describe`) on every run and rewrote pixi.lock, leaving the working
# tree perpetually dirty. Keeping it out of the lock removes that churn. The
# pixi-based CI jobs (ruff/mypy/yamllint) analyse source directly and do not
# need the package installed. See issue #456; lockfile-v7 follow-up is #455.
# `--no-deps` keeps pip from re-resolving runtime deps that pixi already
# manages. We deliberately omit `--no-build-isolation`: pip's editable build
# subprocess loads the backend from its own ephemeral env, and across
# `pixi run` boundaries the parent pixi env's hatchling is not always visible
# to that subprocess. Letting pip create an isolated build env (which fetches
# hatchling/hatch-vcs/editables from PyPI) is slower on first run but works
# reliably in both local and CI contexts.
dev-install = "pip install -e . --no-deps"

[dependencies]
python = ">=3.10"
pip = "*"
pydantic = ">=2.12.5,<3"
pygments = ">=2.20.0"  # CVE-2026-4539
pygithub = ">=2.9.1,<3"
# Transitive via pygithub. Pinned to pull the security fix for
# PYSEC-2026-175/177/178/179 (all fixed in 2.13.0); without this the locked
# env resolves to 2.12.1 and pip-audit fails the dependency scan.
pyjwt = ">=2.13.0"
# Build backend for the `dev-install` editable install.
hatchling = ">=1.27.0,<2"
hatch-vcs = ">=0.4.0,<1"
editables = ">=0.5,<1"

[feature.dev.dependencies]
pre-commit = ">=3.0,<5"
pytest = ">=9.0.0,<10"
pytest-cov = ">=7.0.0,<8"
types-pyyaml = ">=6.0.12,<7"
ruff = ">=0.1.0,<1"
mypy = ">=1.8.0,<2"
# yamllint floor tracks the .pre-commit-config.yaml mirror rev (v1.38.0) so the
# local hook and the pixi-driven CI `lint` job resolve the same major/minor.
# See the single-source-of-truth note at the top of .pre-commit-config.yaml.
yamllint = ">=1.38.0,<2"
just = ">=1.25.0,<2"
bats-core = ">=1.11.0,<2"

[feature.dev.pypi-dependencies]
pip-audit = ">=2.7,<3"
build = ">=1.0,<2"
pdoc = ">=14.0,<15"
# pytest-watcher (ptw) powers `just watch` — runs unit tests on file change for
# fast feedback during local development. Actively maintained fork of the
# unmaintained pytest-watch (last 2018 release; see issue #746). Not on
# conda-forge; ships from PyPI.
pytest-watcher = ">=0.4,<1"

[feature.lint.dependencies]
ruff = ">=0.1.0,<1"
mypy = ">=1.8.0,<2"
# Keep this yamllint floor in lockstep with [feature.dev] above and the
# .pre-commit-config.yaml yamllint mirror rev (v1.38.0).
yamllint = ">=1.38.0,<2"
pre-commit = ">=3.0,<5"
types-pyyaml = ">=6.0.12,<7"

[feature.lint.pypi-dependencies]
pip-audit = ">=2.7,<3"
bandit = ">=1.9.4,<2"

[feature.lint.tasks]
# pip-audit suppression ledger. Each --ignore-vuln below MUST carry a reason +
# a re-review trigger so a suppression is never silently permanent. Re-review
# the whole list every dependency bump (or quarterly, whichever comes first).
#
# PYSEC-2025-183 (CVE-2025-45768): affects every pyjwt release (0.1.1-2.12.1) with
#   no fixed version, and is disputed by the pyjwt maintainers — it concerns the key
#   length chosen by the calling application, not a library defect. pyjwt is only a
#   transitive dependency of pygithub (we never import it directly), so there is no
#   version bump or code change that resolves it. Ignored as unfixable + disputed.
#   Re-review: drop if pyjwt publishes a fixed release or pygithub drops the dep.
pip-audit = "pip-audit --ignore-vuln PYSEC-2025-183"
sast = "bandit -c pyproject.toml -r hephaestus scripts --severity-level medium"

[environments]
default = { features = ["dev"], solve-group = "default" }
lint = { features = ["lint"], solve-group = "lint" }
