name: Auto Tag Release

on:
  workflow_dispatch:
    inputs:
      bump_kind:
        description: "Version component to bump: patch | minor | major"
        required: false
        default: "patch"

permissions:
  contents: write

jobs:
  auto-tag:
    runs-on: ubuntu-24.04
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3
        with:
          fetch-depth: 0
          fetch-tags: true
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure git bot identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Import GPG key
        uses: crazy-max/ghaction-import-gpg@2dc316deee8e90f13e1a351ab510b4d5bc0c82cd  # v7.0.0
        with:
          gpg_private_key: ${{ secrets.GPG_PRIVATE_KEY }}
          passphrase: ${{ secrets.GPG_PASSPHRASE }}
          git_user_signingkey: true
          git_commit_gpgsign: true
          git_tag_gpgsign: true

      - name: Compute next version and push tag
        shell: bash
        env:
          BUMP_KIND: ${{ github.event.inputs.bump_kind || 'patch' }}
        run: |
          # Find the highest existing vX.Y.Z tag and increment the requested component
          LATEST_TAG=$(git tag --list 'v*' --sort=-v:refname | head -1)
          if [ -z "${LATEST_TAG}" ]; then
            # No vX.Y.Z tags found. This repo is tag-driven and already has a
            # published history (13+ tags as of v0.9.2), so an empty result here
            # means the tags were not fetched (missing fetch-depth/fetch-tags) or
            # a fresh repo with no release line — NOT a request to seed a version.
            # Fail loudly rather than silently inventing a stale base tag, which
            # would push a wrong release tag and trigger release.yml.
            echo "::error::No vX.Y.Z tags found. Refusing to seed a version automatically." >&2
            echo "::error::Ensure tags are fetched (fetch-depth: 0, fetch-tags: true) or create the initial tag manually." >&2
            exit 1
          else
            LATEST="${LATEST_TAG#v}"
          fi

          MAJOR=$(echo "${LATEST}" | cut -d. -f1)
          MINOR=$(echo "${LATEST}" | cut -d. -f2)
          PATCH=$(echo "${LATEST}" | cut -d. -f3)

          case "${BUMP_KIND}" in
            major)
              NEXT="$((MAJOR + 1)).0.0"
              ;;
            minor)
              NEXT="${MAJOR}.$((MINOR + 1)).0"
              ;;
            patch|*)
              NEXT="${MAJOR}.${MINOR}.$((PATCH + 1))"
              ;;
          esac
          TAG="v${NEXT}"

          # Idempotent: skip if tag already exists
          if git rev-parse "${TAG}" >/dev/null 2>&1; then
            echo "Tag ${TAG} already exists — nothing to do"
            exit 0
          fi

          echo "Creating tag: ${TAG} (bump: ${BUMP_KIND})"
          # Signed annotated tag — provenance matches the signed-commit policy.
          # Requires GPG_PRIVATE_KEY/GPG_PASSPHRASE secrets imported above.
          git tag -s "${TAG}" -m "Release ${TAG}"
          git push origin "${TAG}"
          echo "Created and pushed tag: ${TAG}"
          # release.yml triggers automatically on push: tags: ['v*']
