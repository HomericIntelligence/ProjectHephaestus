name: Security

on:
  pull_request:
    paths:
      - "pixi.toml"
      - "pixi.lock"
      - "pyproject.toml"
      - "**/*.py"
      - ".github/workflows/security.yml"
  schedule:
    - cron: "0 8 * * 1"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  pip-audit:
    name: Dependency vulnerability scan
    runs-on: ubuntu-24.04
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3

      - name: Install pixi
        uses: prefix-dev/setup-pixi@5185adfbffb4bd703da3010310260805d89ebb11  # v0.9.6
        with:
          pixi-version: v0.69.0
          environments: lint
          locked: true
          # setup-pixi already caches `.pixi` keyed exactly on the pixi.lock
          # hash. A second actions/cache step over `.pixi` restored a STALE env
          # (saved by an earlier poisoned run under the same exact key) on top
          # of this --locked install, downgrading urllib3 2.7.0 -> 2.6.3 so
          # pip-audit failed against an already-patched lock. Do not add one.

      - name: Run pip-audit
        id: pip-audit
        run: pixi run --environment lint pip-audit

      - name: Post pip-audit summary
        if: always()
        env:
          AUDIT_OUTCOME: ${{ steps.pip-audit.outcome }}
        run: |
          {
            echo "## pip-audit Security Scan"
            echo ""
            if [ "$AUDIT_OUTCOME" = "success" ]; then
              echo "No HIGH/CRITICAL vulnerabilities found."
            else
              echo "Vulnerabilities detected — see job logs for details."
            fi
          } >> "$GITHUB_STEP_SUMMARY"

  sast:
    name: Static Application Security Testing
    runs-on: ubuntu-24.04
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3

      - name: Install pixi
        uses: prefix-dev/setup-pixi@5185adfbffb4bd703da3010310260805d89ebb11  # v0.9.6
        with:
          pixi-version: v0.69.0
          environments: lint
          locked: true
          # setup-pixi already caches `.pixi` keyed exactly on the pixi.lock
          # hash. A second actions/cache step over `.pixi` restored a STALE env
          # (saved by an earlier poisoned run under the same exact key) on top
          # of this --locked install, downgrading urllib3 2.7.0 -> 2.6.3 so
          # pip-audit failed against an already-patched lock. Do not add one.

      - name: Run bandit (SAST)
        id: bandit
        run: pixi run --environment lint sast

      - name: Post bandit summary
        if: always()
        env:
          BANDIT_OUTCOME: ${{ steps.bandit.outcome }}
        run: |
          {
            echo "## Bandit Static Application Security Testing"
            echo ""
            if [ "$BANDIT_OUTCOME" = "success" ]; then
              echo "No security issues found."
            else
              echo "Security issues detected — see job logs for details."
            fi
          } >> "$GITHUB_STEP_SUMMARY"
