name: Auto-label needs-plan

# Reusable workflow that tags newly-opened (or re-opened) GitHub issues with
# the ``state:needs-plan`` label so the automation pipeline picks them up on
# its next loop iteration (#704). Other HomericIntelligence repos call this
# via ``workflow_call`` from a tiny on:issues:opened stub.
#
# Self-trigger when called as a local workflow (Hephaestus uses it for its
# own issues), and respond to ``workflow_call`` from other repos.

on:
  workflow_call:
  issues:
    types: [opened, reopened]

# Least-privilege: read repo contents (so workflow checkout is implicit if
# needed in future), write only to issues for the label-edit call.
permissions:
  contents: read
  issues: write

jobs:
  needs-plan:
    runs-on: ubuntu-24.04
    timeout-minutes: 2
    if: github.event_name == 'issues'
    steps:
      - name: Add state:needs-plan label
        env:
          GH_TOKEN: ${{ github.token }}
          # Server-supplied integers — safe to bind. We deliberately do NOT
          # bind any user-controllable fields (issue title/body/labels);
          # passing only the issue number to ``gh api`` keeps the shell
          # command-injection-free even though "$VAR" quoting already would.
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          # Validate the issue number is purely numeric before passing it
          # to ``gh api`` — defence in depth against any future change to
          # the event payload shape.
          case "$ISSUE_NUMBER" in
            ''|*[!0-9]*)
              echo "::error::Unexpected ISSUE_NUMBER value (not a positive integer)"
              exit 1
              ;;
          esac
          # ``gh api`` POST against the labels endpoint is idempotent — adding
          # a label the issue already carries is a no-op — so re-runs (e.g.
          # via ``reopened``) are safe.
          gh api \
            --method POST \
            "repos/$REPO/issues/$ISSUE_NUMBER/labels" \
            -f "labels[]=state:needs-plan"
