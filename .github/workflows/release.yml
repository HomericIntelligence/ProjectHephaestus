name: Release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to release (leave blank to use latest tag)"
        required: false
        default: ""

permissions:
  contents: write
  id-token: write

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v6.0.2
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Install pixi
        uses: prefix-dev/setup-pixi@v0.9.5
        with:
          pixi-version: v0.63.2
          locked: false

      - name: Cache pixi environments
        uses: actions/cache@v5
        with:
          path: |
            .pixi
            ~/.cache/rattler/cache
          key: ${{ runner.os }}-pixi-${{ hashFiles('pixi.lock') }}
          restore-keys: |
            ${{ runner.os }}-pixi-

      - name: Run tests
        run: pixi run pytest tests/unit

  type-check:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v6.0.2
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Install pixi
        uses: prefix-dev/setup-pixi@v0.9.5
        with:
          pixi-version: v0.63.2
          locked: false

      - name: Cache pixi environments
        uses: actions/cache@v5
        with:
          path: |
            .pixi
            ~/.cache/rattler/cache
          key: ${{ runner.os }}-pixi-${{ hashFiles('pixi.lock') }}
          restore-keys: |
            ${{ runner.os }}-pixi-

      - name: Run mypy type checking
        run: pixi run mypy

  build-and-publish:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [test, type-check]
    environment: pypi

    steps:
      - uses: actions/checkout@v6.0.2
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Resolve tag
        id: tag
        shell: bash
        run: |
          INPUT_TAG="${{ github.event.inputs.tag }}"
          if [ -n "$INPUT_TAG" ]; then
            TAG="$INPUT_TAG"
          else
            TAG=$(git tag --list 'v*' --sort=-v:refname | head -1)
          fi
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "Releasing tag: ${TAG}"
          git checkout "${TAG}"

      - name: Install pixi
        uses: prefix-dev/setup-pixi@v0.9.5
        with:
          pixi-version: v0.63.2
          locked: false

      - name: Cache pixi environments
        uses: actions/cache@v5
        with:
          path: |
            .pixi
            ~/.cache/rattler/cache
          key: ${{ runner.os }}-pixi-${{ hashFiles('pixi.lock') }}
          restore-keys: |
            ${{ runner.os }}-pixi-

      - name: Verify tag matches package version
        shell: bash
        env:
          TAG: ${{ steps.tag.outputs.tag }}
        run: |
          TAG_VERSION="${TAG#v}"
          PKG_VERSION=$(pixi run python -c "import hephaestus; print(hephaestus.__version__)")
          if [ "$TAG_VERSION" != "$PKG_VERSION" ]; then
            echo "::error::Tag version ($TAG_VERSION) does not match package version ($PKG_VERSION)"
            exit 1
          fi
          echo "Version check passed: $TAG_VERSION"

      - name: Build package
        run: pixi run python -m build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          verbose: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          generate_release_notes: true
          files: dist/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
