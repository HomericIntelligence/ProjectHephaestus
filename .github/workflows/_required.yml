name: Required Checks

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: required-${{ github.workflow }}-${{ github.head_ref || github.sha }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  forbid-suppressions:
    name: forbid-suppressions
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: "Reject silent-failure workaround in shell/YAML/Dockerfile/justfile/HCL"
        run: |
          set -euo pipefail
          mapfile -t files < <(git ls-files \
            -- \
            '*.sh' '*.bash' '*.yml' '*.yaml' '*.hcl' \
            'Dockerfile*' '**/Dockerfile*' \
            'justfile' '**/justfile' 'Justfile' '**/Justfile')
          declare -a scan_files=()
          for f in "${files[@]}"; do
            case "$f" in
              # Exempt this workflow file (heredoc would otherwise self-match)
              .github/workflows/_required.yml) continue ;;
              # Exempt any runbook that documents the rule (if present)
              docs/runbooks/no-silent-failures.md) continue ;;
            esac
            scan_files+=("$f")
          done
          if [ "${#scan_files[@]}" -eq 0 ]; then
            echo "No files to scan"
            exit 0
          fi
          if grep -nE '\|\|[[:space:]]*true([[:space:]]*$|[[:space:]]+#)' "${scan_files[@]}"; then
            echo ""
            echo '::error::Found silent-failure workarounds above. Refactor per HomericIntelligence/Odysseus#280.'
            exit 1
          fi
          echo 'OK: no silent-failure workarounds found'

      - name: "Reject continue-on-error workflow opt-out"
        run: |
          set -euo pipefail
          mapfile -t files < <(git ls-files -- '.github/workflows/*.yml' '.github/workflows/*.yaml')
          if [ "${#files[@]}" -eq 0 ]; then
            echo "No workflow files"
            exit 0
          fi
          if grep -nE '^[[:space:]]*continue-on-error:[[:space:]]*true[[:space:]]*$' "${files[@]}"; then
            echo ""
            echo '::error::Found "continue-on-error: true" above. Fix the root cause per HomericIntelligence/Odysseus#280.'
            exit 1
          fi
          echo 'OK: no "continue-on-error: true" found'

  lint:
    name: lint
    runs-on: ubuntu-24.04
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Install pixi
        uses: prefix-dev/setup-pixi@1b2de7f3351f171c8b4dfeb558c639cb58ed4ec0  # v0.9.5
        with:
          pixi-version: v0.63.2
          environments: lint
          locked: false

      - name: Cache pixi environments
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae  # v5
        with:
          path: |
            .pixi
            ~/.cache/rattler/cache
          key: pixi-lint-${{ runner.os }}-${{ hashFiles('pixi.lock') }}
          restore-keys: |
            pixi-lint-${{ runner.os }}-

      - name: Ruff check
        run: pixi run --environment lint ruff check hephaestus scripts tests

      - name: Ruff format check
        run: pixi run --environment lint ruff format --check hephaestus scripts tests

      - name: yamllint
        run: pixi run --environment lint yamllint -c .yamllint.yaml .

      - name: mypy
        run: pixi run --environment lint mypy

  markdownlint:
    name: markdownlint
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    needs: lint
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
      - name: Run markdownlint-cli2
        uses: DavidAnson/markdownlint-cli2-action@ded1f9488f68a970bc66ea5619e13e9b52e601cd  # v20.0.0
        with:
          globs: |
            **/*.md
            !.claude/**
          config: ".markdownlint.yaml"

  pixi-check:
    name: pixi-check
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    needs: lint
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
      - name: Skip if no pixi.toml
        id: detect
        run: |
          if [ ! -f pixi.toml ]; then
            echo "::notice::No pixi.toml in repo, skipping pixi-check"
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi
      - name: Setup pixi
        if: steps.detect.outputs.skip == 'false'
        uses: prefix-dev/setup-pixi@1b2de7f3351f171c8b4dfeb558c639cb58ed4ec0  # v0.9.5
        with:
          pixi-version: v0.67.2
          cache: true
      - name: pixi install (locked)
        if: steps.detect.outputs.skip == 'false'
        run: |
          if [ -f pixi.lock ]; then
            pixi install --locked
          else
            echo "::warning::pixi.toml present but pixi.lock missing — running unlocked"
            pixi install
          fi

  justfile-check:
    name: justfile-check
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    needs: lint
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
      - name: Skip if no justfile
        id: detect
        run: |
          if [ ! -f justfile ] && [ ! -f Justfile ]; then
            echo "::notice::No justfile in repo, skipping justfile-check"
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi
      - name: Install just
        if: steps.detect.outputs.skip == 'false'
        uses: extractions/setup-just@53165ef7e734c5c07cb06b3c8e7b647c5aa16db3  # v4.0.0
        with:
          just-version: "1.36.0"
      - name: Validate justfile
        if: steps.detect.outputs.skip == 'false'
        run: |
          just --evaluate >/dev/null
          just --list >/dev/null

  symlink-check:
    name: symlink-check
    runs-on: ubuntu-24.04
    timeout-minutes: 3
    needs: lint
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
      - name: Run symlink check
        run: bash scripts/check-symlinks.sh

  shellcheck:
    name: shellcheck
    runs-on: ubuntu-24.04
    timeout-minutes: 3
    needs: lint
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
      - name: Install shellcheck
        run: sudo apt-get update && sudo apt-get install -y shellcheck
      - name: Run shellcheck
        run: |
          set -euo pipefail
          shopt -s nullglob
          files=(scripts/*.sh scripts/shell/*.sh)
          if [[ ${#files[@]} -eq 0 ]]; then
            echo "No shell scripts found — nothing to lint."
            exit 0
          fi
          # severity=error catches genuine bugs (unquoted vars in dangerous
          # contexts, broken syntax) without bikeshedding on style — matches
          # the bug class that broke the AchaeanFleet automation loop.
          shellcheck --severity=error "${files[@]}"

  unit-tests:
    name: unit-tests
    runs-on: ubuntu-24.04
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Set up Python 3.12
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6
        with:
          python-version: "3.12"

      - name: Cache pip packages
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae  # v5
        with:
          path: ~/.cache/pip
          key: pip-${{ runner.os }}-3.12-${{ hashFiles('pyproject.toml') }}
          restore-keys: |
            pip-${{ runner.os }}-3.12-

      - name: Install package
        run: pip install -e ".[dev]"

      - name: Run unit tests
        run: pytest tests/unit --override-ini="addopts=" -v --strict-markers --cov=hephaestus --cov-report=term-missing --cov-fail-under=80

      - name: Check unit test structure
        run: python scripts/check_unit_test_structure.py

  integration-tests:
    name: integration-tests
    runs-on: ubuntu-24.04
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Set up Python 3.12
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6
        with:
          python-version: "3.12"

      - name: Cache pip packages
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae  # v5
        with:
          path: ~/.cache/pip
          key: pip-${{ runner.os }}-3.12-${{ hashFiles('pyproject.toml') }}
          restore-keys: |
            pip-${{ runner.os }}-3.12-

      - name: Install package
        run: pip install -e ".[dev]"

      - name: Run integration tests
        run: pytest tests/integration --override-ini="addopts=" -v --strict-markers

  build:
    name: build
    runs-on: ubuntu-24.04
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          fetch-depth: 0

      - name: Set up Python 3.12
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6
        with:
          python-version: "3.12"

      - name: Cache pip packages
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae  # v5
        with:
          path: ~/.cache/pip
          key: pip-${{ runner.os }}-3.12-build-${{ hashFiles('pyproject.toml') }}
          restore-keys: |
            pip-${{ runner.os }}-3.12-build-

      - name: Install build deps
        run: pip install build hatchling hatch-vcs

      - name: Build wheel and sdist
        run: python -m build --no-isolation

      - name: Smoke-test installed wheel
        run: |
          pip install dist/homericintelligence_hephaestus-*.whl --force-reinstall
          python -c "import hephaestus; print('Package version:', hephaestus.__version__)"
          python -c "from hephaestus import slugify, retry_with_backoff, setup_logging; print('OK')"

  security-dependency-scan:
    name: security/dependency-scan
    runs-on: ubuntu-24.04
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Install pixi
        uses: prefix-dev/setup-pixi@1b2de7f3351f171c8b4dfeb558c639cb58ed4ec0  # v0.9.5
        with:
          pixi-version: v0.63.2
          environments: lint
          locked: false

      - name: Cache pixi environments
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae  # v5
        with:
          path: |
            .pixi
            ~/.cache/rattler/cache
          key: pixi-lint-${{ runner.os }}-${{ hashFiles('pixi.lock') }}
          restore-keys: |
            pixi-lint-${{ runner.os }}-

      - name: Run pip-audit
        id: pip-audit
        run: pixi run --environment lint pip-audit

      - name: Post pip-audit summary
        if: always()
        env:
          AUDIT_OUTCOME: ${{ steps.pip-audit.outcome }}
        run: |
          {
            echo "## pip-audit Security Scan"
            echo ""
            if [ "$AUDIT_OUTCOME" = "success" ]; then
              echo "No HIGH/CRITICAL vulnerabilities found."
            else
              echo "Vulnerabilities detected — see job logs for details."
            fi
          } >> "$GITHUB_STEP_SUMMARY"

  security-secrets-scan:
    name: security/secrets-scan
    runs-on: ubuntu-24.04
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          fetch-depth: 0

      - name: Run Gitleaks
        run: |
          wget -q https://github.com/gitleaks/gitleaks/releases/download/v8.30.0/gitleaks_8.30.0_linux_x64.tar.gz
          echo "79a3ab579b53f71efd634f3aaf7e04a0fa0cf206b7ed434638d1547a2470a66e  gitleaks_8.30.0_linux_x64.tar.gz" | sha256sum --check
          tar -xzf gitleaks_8.30.0_linux_x64.tar.gz
          chmod +x gitleaks
          if [ -f .gitleaks.toml ]; then
            ./gitleaks detect --source=. --config=.gitleaks.toml --verbose --exit-code=1
          else
            ./gitleaks detect --source=. --verbose --exit-code=1
          fi

  schema-validation:
    name: schema-validation
    runs-on: ubuntu-24.04
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Set up Python 3.12
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6
        with:
          python-version: "3.12"

      - name: Install check-jsonschema
        run: pip install check-jsonschema

      - name: Validate GitHub workflow schemas
        run: |
          set -euo pipefail
          # Probe the remote schema first so a schemastore.org outage emits a
          # clear notice instead of being swallowed by `continue-on-error: true`.
          schema_url="https://json.schemastore.org/github-workflow"
          if ! curl -fsSL --max-time 15 -o /tmp/github-workflow.schema.json "$schema_url"; then
            echo "::warning::Could not fetch $schema_url — skipping schema validation"
            exit 0
          fi
          mapfile -t wf_files < <(find .github/workflows -name "*.yml")
          if [ "${#wf_files[@]}" -eq 0 ]; then
            echo "No workflow files to validate"
            exit 0
          fi
          check-jsonschema \
            --schemafile /tmp/github-workflow.schema.json \
            "${wf_files[@]}"

  deps-version-sync:
    name: deps/version-sync
    runs-on: ubuntu-24.04
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          fetch-depth: 0

      - name: Set up Python 3.12
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6
        with:
          python-version: "3.12"

      - name: Install package (for __version__)
        run: pip install -e "." --no-deps

      - name: Check version consistency
        run: |
          set -euo pipefail

          # Extract version from pyproject.toml via hatch-vcs (dynamic)
          DYNAMIC=$(python -c "
          import tomllib
          with open('pyproject.toml', 'rb') as f:
              d = tomllib.load(f)
          dynamic = d.get('project', {}).get('dynamic', [])
          print('dynamic' if 'version' in dynamic else 'static')
          ")
          echo "Version strategy: $DYNAMIC"

          # Resolve the actual installed version
          PKG_VERSION=$(python -c "import hephaestus; print(hephaestus.__version__)")
          echo "Installed __version__: $PKG_VERSION"

          # If a VERSION file exists, cross-check it
          if [ -f VERSION ]; then
            FILE_VERSION=$(cat VERSION | tr -d '[:space:]')
            echo "VERSION file: $FILE_VERSION"
            if [ "$PKG_VERSION" != "$FILE_VERSION" ]; then
              echo "ERROR: __version__ ($PKG_VERSION) does not match VERSION file ($FILE_VERSION)"
              exit 1
            fi
            echo "Version files are in sync."
          else
            echo "No VERSION file present — skipping file cross-check."
          fi
