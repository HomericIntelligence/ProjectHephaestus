version: 2
updates:
  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "weekly"
    labels:
      - "dependencies"
    # Dependabot auto-appends a colon after a prefix ending in ) → "chore(deps): ...".
    # https://docs.github.com/en/code-security/dependabot/working-with-dependabot/dependabot-options-reference
    commit-message:
      prefix: "chore(deps)"
    groups:
      python-dependencies:
        patterns:
          - "*"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    labels:
      - "dependencies"
      - "ci/cd"
    commit-message:
      prefix: "chore(deps)"
    groups:
      github-actions:
        patterns:
          - "*"
