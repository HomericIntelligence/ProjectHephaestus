# Pre-commit hooks for ProjectHephaestus
# Install: pixi run pre-commit install
# Run manually: pixi run pre-commit run --all-files
#
# Linter version pinning — single source of truth:
#   pixi.toml [feature.lint] is authoritative for tool versions used in CI
#   (ruff, mypy, yamllint run via `pixi run --environment lint ...` in
#   .github/workflows/_required.yml). The mirror `rev:`s below pin the SAME
#   tools for the local pre-commit run, so they MUST stay within the pixi
#   range to keep local == CI. When bumping a tool, change pixi.toml first,
#   then update the matching `rev:` here:
#     - yamllint  (adrienverge/yamllint rev)        ⇄ pixi yamllint
#     - shellcheck (shellcheck-py rev)              ⇄ CI installs via apt; keep
#                                                      this rev current with it
#     - markdownlint-cli2 (DavidAnson rev)          ⇄ CI markdownlint-cli2-action
#     - pre-commit-hooks (pre-commit/pre-commit-hooks rev) ⇄ meta hooks, no pixi pkg
#   `hephaestus-check-precommit-versions` flags drift for the pixi-backed tools.

repos:

  # Python formatting and linting
  - repo: local
    hooks:
      - id: ruff-format-python
        name: Ruff Format Python
        description: Format Python files using ruff format
        entry: pixi run ruff format hephaestus/ scripts/ tests/
        language: system
        files: ^(hephaestus|scripts|tests)/.*\.py$
        types: [python]
        pass_filenames: false
      - id: ruff-check-python
        name: Ruff Check Python
        description: Lint Python files using ruff check
        entry: pixi run ruff check --fix hephaestus/ scripts/ tests/
        language: system
        files: ^(hephaestus|scripts|tests)/.*\.py$
        types: [python]
        pass_filenames: false
      - id: mypy-check-python
        name: Mypy Type Check Python
        description: Type check Python files using mypy
        entry: pixi run mypy
        language: system
        files: ^(hephaestus|scripts|tests)/.*\.py$
        types: [python]
        pass_filenames: false

  # Markdown linting
  - repo: https://github.com/DavidAnson/markdownlint-cli2
    rev: v0.20.0
    hooks:
      - id: markdownlint-cli2
        name: Markdown Lint
        description: Lint markdown files for consistency
        exclude: ^(build/|docs/)
        args: ['--config', '.markdownlint.yaml', '--fix']

  # YAML linting
  - repo: https://github.com/adrienverge/yamllint
    rev: v1.38.0
    hooks:
      - id: yamllint
        name: YAML Lint
        description: Lint YAML files for syntax and style
        args: ['--config-file', '.yamllint.yaml']
        exclude: ^(\.pixi|build)/

  # Security: CVE scanning
  - repo: local
    hooks:
      - id: pip-audit
        name: pip-audit (CVE scan)
        description: Scan dependencies for known CVEs
        entry: pixi run pip-audit
        language: system
        pass_filenames: false
        stages: [manual]

  # Security: SAST (Static Application Security Testing)
  - repo: local
    hooks:
      - id: bandit
        name: Bandit (SAST)
        description: AST-based Python security scanner (subprocess/shell injection)
        entry: pixi run --environment lint sast
        language: system
        files: ^(hephaestus|scripts)/.*\.py$
        types: [python]
        pass_filenames: false

  # Lock file freshness
  - repo: local
    hooks:
      - id: check-pixi-lock
        name: Check pixi lock file
        description: Verify pixi.lock is up to date
        entry: pixi install --locked
        language: system
        pass_filenames: false
        files: ^pixi\.(toml|lock)$

  # CLI table sync check
  - repo: local
    hooks:
      - id: check-cli-table-sync
        name: Check README CLI table sync
        description: Ensure README.md CLI table documents every pyproject.toml [project.scripts] entry
        entry: python3 scripts/check_cli_table_sync.py
        language: system
        pass_filenames: false
        files: ^(README\.md|pyproject\.toml)$

  # Skill catalog sync check
  - repo: local
    hooks:
      - id: hephaestus-check-skill-catalog
        name: hephaestus check skill catalog
        description: Ensure docs/plugin-installation.md lists every shipped skill and skill frontmatter is valid
        # --environment default is explicit because the pre-commit CI job runs
        # in the lint env; the hephaestus-* console scripts live in default.
        entry: pixi run --environment default hephaestus-check-skill-catalog
        language: system
        files: '^(docs/plugin-installation\.md|skills/)'
        pass_filenames: false

  # Test structure enforcement
  - repo: local
    hooks:
      - id: check-unit-test-structure
        name: Check unit test structure
        description: Enforce tests/unit/ mirrors hephaestus/ and has no loose test files
        # --environment default is explicit because the pre-commit CI job runs
        # in the lint env; the hephaestus-* console scripts live in default.
        entry: pixi run --environment default hephaestus-check-test-structure
        language: system
        pass_filenames: false
        files: ^(hephaestus|tests/unit)/

  # Complexity check
  - repo: local
    hooks:
      - id: ruff-check-complexity
        name: Ruff Complexity Check (C901)
        description: Enforce McCabe complexity limit on hephaestus/
        entry: pixi run ruff check --select C901 hephaestus/
        language: system
        files: ^hephaestus/.*\.py$
        types: [python]
        pass_filenames: false

  # Python version consistency check
  - repo: local
    hooks:
      - id: check-python-version-consistency
        name: Check Python version consistency
        description: Ensure Python version is consistent across pyproject.toml, pixi.toml, and CI
        entry: python3 scripts/check_python_version_consistency.py
        language: system
        pass_filenames: false
        files: ^(pyproject\.toml|pixi\.toml|\.github/workflows/.*\.yml)$

  # Version single source of truth check
  - repo: local
    hooks:
      - id: check-version-single-source
        name: Check version single source of truth
        description: Ensure pyproject.toml is the sole version authority, pixi.toml has no version
        entry: python3 scripts/check_version_single_source.py
        language: system
        pass_filenames: false
        files: ^(pyproject\.toml|pixi\.toml)$

  # Dependency-sync check: requirements*.txt entries must exist in pixi.toml
  # and fall within the declared range. See hephaestus.config.dep_sync.
  - repo: local
    hooks:
      - id: check-dep-sync
        name: Check dependency declarations are consistent
        description: Validate requirements*.txt entries against pixi.toml
        # --environment default is explicit because the pre-commit CI job runs
        # in the lint env; the hephaestus-* console scripts live in default.
        entry: pixi run --environment default hephaestus-check-dep-sync
        language: system
        pass_filenames: false
        files: ^(pyproject\.toml|pixi\.toml|pixi\.lock|requirements.*\.txt)$

  # Forbid silent-failure workarounds (|| true / continue-on-error: true).
  # See HomericIntelligence/Odysseus#280.
  - repo: local
    hooks:
      - id: forbid-or-true
        name: "forbid silent-failure workaround in shell/YAML/Dockerfile/justfile/HCL"
        description: >
          Rejects the `or-true` idiom (and its whitespace variants) in shell,
          YAML, Dockerfile, justfile, and HCL sources. Refactor to an explicit
          `if`-guard, a real conditional, or a documented `set +e`/`set -e`
          bracket. See HomericIntelligence/Odysseus#280.
        language: pygrep
        entry: '\|\|\s*true(\s*$|\s+#)'
        files: \.(sh|bash|yml|yaml|hcl)$|(^|/)Dockerfile[^/]*$|(^|/)[Jj]ustfile$
        types: [text]
        pass_filenames: true

      - id: forbid-continue-on-error
        name: "forbid continue-on-error workflow opt-out"
        description: >
          GitHub Actions `continue-on-error true` (truthy form) hides real CI
          failures. Fix the underlying job/step instead.
        language: pygrep
        entry: '^\s*continue-on-error:\s*true\s*$'
        files: ^\.github/workflows/.*\.ya?ml$
        pass_filenames: true

      - id: forbid-advisory-warnings
        name: "forbid advisory ::warning:: pattern in workflow run blocks"
        description: >
          The advisory-warning workflow annotation is morally equivalent to
          `continue-on-error: true` when it replaces a tool's failure exit
          with a benign-looking warning. The CI step still passes, the
          underlying problem still goes unfixed. Make the step fail-fast
          instead. The only legitimate use is annotating a step that runs
          BEFORE the failing tool (e.g., advising on a deprecated config),
          not wrapping the tool's own exit. See docs/runbooks/no-silent-failures.md.
        language: pygrep
        # Match the GitHub Actions advisory-annotation prefix. We exempt
        # this workflow file (the lint rule itself contains the literal
        # for self-documentation) via the `exclude` regex below.
        entry: '::warning::'
        files: ^\.github/workflows/.*\.ya?ml$
        exclude: ^\.github/workflows/_required\.yml$
        pass_filenames: true

  # Shellcheck for shell scripts
  - repo: https://github.com/shellcheck-py/shellcheck-py
    rev: v0.10.0.1
    hooks:
      - id: shellcheck
        name: ShellCheck
        description: Shell script linter
        files: \.sh$
        # -x lets shellcheck follow `# shellcheck source=...` directives
        # (e.g. install.sh sourcing lib/install_helpers.sh).
        args: [-x]

  # General file checks
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-toml
      - id: check-added-large-files
        args: ['--maxkb=5000']
      - id: mixed-line-ending
      - id: check-merge-conflict
      - id: debug-statements
      - id: detect-private-key
      - id: detect-aws-credentials
        args: ['--allow-missing-credentials']
