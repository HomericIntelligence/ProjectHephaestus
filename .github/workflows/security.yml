name: Security

on:
  pull_request:
    paths:
      - "pixi.toml"
      - "pixi.lock"
      - "pyproject.toml"
      - "**/*.py"
      - ".github/workflows/security.yml"
  schedule:
    - cron: "0 8 * * 1"
  workflow_dispatch:

jobs:
  pip-audit:
    name: Dependency vulnerability scan
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Install pixi
        uses: prefix-dev/setup-pixi@1b2de7f3351f171c8b4dfeb558c639cb58ed4ec0  # v0.9.5
        with:
          pixi-version: v0.63.2
          environments: lint
          locked: false

      - name: Cache pixi environments
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae  # v5
        with:
          path: |
            .pixi
            ~/.cache/rattler/cache
          key: pixi-lint-${{ runner.os }}-${{ hashFiles('pixi.lock') }}

      - name: Run pip-audit
        id: pip-audit
        run: pixi run --environment lint pip-audit

      - name: Post pip-audit summary
        if: always()
        env:
          AUDIT_OUTCOME: ${{ steps.pip-audit.outcome }}
        run: |
          {
            echo "## pip-audit Security Scan"
            echo ""
            if [ "$AUDIT_OUTCOME" = "success" ]; then
              echo "No HIGH/CRITICAL vulnerabilities found."
            else
              echo "Vulnerabilities detected — see job logs for details."
            fi
          } >> "$GITHUB_STEP_SUMMARY"
