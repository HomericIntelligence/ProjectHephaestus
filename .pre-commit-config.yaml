# Pre-commit hooks for ProjectHephaestus
# Install: pixi run pre-commit install
# Run manually: pixi run pre-commit run --all-files

repos:

  # Security checks
  - repo: local
    hooks:
      - id: check-shell-injection
        name: Check for shell=True (Security)
        description: Prevent command injection vulnerabilities via shell=True
        entry: 'shell=True'
        language: pygrep
        files: \.py$
        types: [python]

  # Python formatting and linting
  - repo: local
    hooks:
      - id: ruff-format-python
        name: Ruff Format Python
        description: Format Python files using ruff format
        entry: pixi run ruff format src/hephaestus/ scripts/ tests/
        language: system
        files: ^(src/hephaestus|scripts|tests)/.*\.py$
        types: [python]
        pass_filenames: false
      - id: ruff-check-python
        name: Ruff Check Python
        description: Lint Python files using ruff check
        entry: pixi run ruff check --fix src/hephaestus/ scripts/ tests/
        language: system
        files: ^(src/hephaestus|scripts|tests)/.*\.py$
        types: [python]
        pass_filenames: false
      - id: mypy-check-python
        name: Mypy Type Check Python
        description: Type check Python files using mypy
        entry: pixi run mypy src/hephaestus/
        language: system
        files: ^src/hephaestus/.*\.py$
        types: [python]
        pass_filenames: false

  # Markdown linting
  - repo: https://github.com/DavidAnson/markdownlint-cli2
    rev: v0.20.0
    hooks:
      - id: markdownlint-cli2
        name: Markdown Lint
        description: Lint markdown files for consistency
        exclude: ^(build/|docs/)
        args: ['--config', '.markdownlint.json', '--fix']

  # YAML linting
  - repo: https://github.com/adrienverge/yamllint
    rev: v1.38.0
    hooks:
      - id: yamllint
        name: YAML Lint
        description: Lint YAML files for syntax and style
        args: ['--config-file', '.yamllint.yaml']
        exclude: ^(\.pixi|build)/

  # Security: CVE scanning
  - repo: local
    hooks:
      - id: pip-audit
        name: pip-audit (CVE scan)
        description: Scan dependencies for known CVEs
        entry: pixi run pip-audit
        language: system
        pass_filenames: false
        stages: [manual]

  # Lock file freshness
  - repo: local
    hooks:
      - id: check-pixi-lock
        name: Check pixi lock file
        description: Verify pixi.lock is up to date
        entry: pixi install --locked
        language: system
        pass_filenames: false
        files: ^pixi\.(toml|lock)$

  # Test structure enforcement
  - repo: local
    hooks:
      - id: check-unit-test-structure
        name: Check unit test structure
        description: Enforce tests/unit/ mirrors src/hephaestus/ subpackage structure
        entry: python scripts/check_unit_test_structure.py
        language: system
        pass_filenames: false
        files: ^(src/hephaestus|tests/unit)/

  # Complexity check
  - repo: local
    hooks:
      - id: ruff-check-complexity
        name: Ruff Complexity Check (C901)
        description: Enforce McCabe complexity limit on hephaestus/
        entry: pixi run ruff check --select C901 src/hephaestus/
        language: system
        files: ^src/hephaestus/.*\.py$
        types: [python]
        pass_filenames: false

  # Python version consistency check
  - repo: local
    hooks:
      - id: check-python-version-consistency
        name: Check Python version consistency
        description: Ensure Python version is consistent across pyproject.toml, pixi.toml, and CI
        entry: python scripts/check_python_version_consistency.py
        language: system
        pass_filenames: false
        files: ^(pyproject\.toml|pixi\.toml|\.github/workflows/.*\.yml)$

  # Shellcheck for shell scripts
  - repo: https://github.com/shellcheck-py/shellcheck-py
    rev: v0.10.0.1
    hooks:
      - id: shellcheck
        name: ShellCheck
        description: Shell script linter
        files: \.sh$

  # General file checks
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-toml
      - id: check-added-large-files
        args: ['--maxkb=5000']
      - id: mixed-line-ending
      - id: check-merge-conflict
      - id: debug-statements
      - id: detect-private-key
      - id: detect-aws-credentials
        args: ['--allow-missing-credentials']
