# Composite action: install pixi + cache its environments.
#
# Extracted from the 4 duplicate "Install pixi" / "Cache pixi environments"
# blocks that previously lived inline in `.github/workflows/_required.yml`.
# The two dimensions of variation between callers — which pixi environment
# to materialize, and which cache key prefix to use — are exposed as
# inputs.
#
# Why a composite action and not a reusable workflow?
# - We need to share STEPS, not jobs. A reusable workflow can only be called
#   via `uses:` at the job level, which forces every caller into a separate
#   job + adds an extra runner spin-up. A composite action runs inline in
#   the caller's existing job, preserving the merge-gate's matrix.
# - The action lives under `.github/actions/` (the GitHub convention for
#   project-local composite actions), and is invoked via
#   `uses: ./.github/actions/setup-pixi-env` with the same relative path
#   from every caller.
#
# Audit reference: closes S6 minor finding from #596 — "extract pixi-setup
# composite action from _required.yml".

name: Setup pixi env
description: Install pixi + cache its environments via prefix-dev/setup-pixi's exact-keyed cache.

inputs:
  environments:
    description: >-
      Which pixi environments to materialize on install. Pass "lint" to
      mount only the lint env (for ruff/mypy/yamllint jobs), or leave
      empty to install the default env (for unit-tests / shell-tests
      / build / etc.).
    required: false
    default: ""
  cache-key-prefix:
    description: >-
      Retained for backward compatibility with existing callers; no longer
      used. Environment caching is now handled entirely by prefix-dev/setup-pixi
      (see the note in the Install pixi step). Callers may still pass this; it
      is ignored.
    required: false
    default: ""

runs:
  using: composite
  steps:
    - name: Install pixi
      uses: prefix-dev/setup-pixi@5185adfbffb4bd703da3010310260805d89ebb11  # v0.9.6
      with:
        pixi-version: v0.69.0
        environments: ${{ inputs.environments }}
        locked: true
        # setup-pixi caches the resolved `.pixi` env itself, keyed EXACTLY on
        # the pixi.lock hash. We deliberately do NOT add a second
        # `actions/cache` step over `.pixi`: a second cache with a
        # lock-agnostic `restore-keys:` prefix would restore a STALE env on top
        # of this `--locked` install, silently downgrading packages (e.g.
        # urllib3 2.7.0 -> 2.6.3) so pip-audit fails against a lock that is
        # actually patched. setup-pixi's exact-keyed cache cannot do that.
