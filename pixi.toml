[workspace]
name = "project-hephaestus"
description = "Shared utilities and tooling for the HomericIntelligence ecosystem"
channels = ["conda-forge"]
platforms = ["linux-64"] # Do not re-enable, "win-64", "osx-64", "osx-arm64"]

[tasks]
test = "pytest"
test-shell = "bats --recursive tests/shell"
lint = "ruff check hephaestus scripts tests"
format = "ruff format hephaestus scripts tests"
mypy = "mypy hephaestus/ scripts/ tests/"
audit = "pixi run --environment lint pip-audit"
docs = "pdoc hephaestus --output-dir docs/api"
# Editable install of this package into the pixi environment, for local dev
# that imports `hephaestus` at runtime. Run once after `pixi install`:
#   pixi run dev-install
# The package is intentionally NOT a [pypi-dependencies] entry: as an editable
# path dependency with a hatch-vcs dynamic version, Pixi re-resolved its version
# (from `git describe`) on every run and rewrote pixi.lock, leaving the working
# tree perpetually dirty. Keeping it out of the lock removes that churn. The
# pixi-based CI jobs (ruff/mypy/yamllint) analyse source directly and do not
# need the package installed. See issue #456; lockfile-v7 follow-up is #455.
dev-install = "pip install -e . --no-build-isolation --no-deps"

[dependencies]
python = ">=3.10"
pip = "*"
pydantic = ">=2.12.5,<3"
pygments = ">=2.20.0"  # CVE-2026-4539
pygithub = ">=2.9.1,<3"
# Build backend for the `dev-install` editable install.
hatchling = ">=1.27.0,<2"
hatch-vcs = ">=0.4.0,<1"
editables = ">=0.5,<1"

[feature.dev.dependencies]
pre-commit = ">=3.0,<5"
pytest = ">=9.0.0,<10"
pytest-cov = ">=7.0.0,<8"
types-pyyaml = ">=6.0.12,<7"
ruff = ">=0.1.0,<1"
mypy = ">=1.8.0,<2"
yamllint = ">=1.35.0,<2"
just = ">=1.25.0,<2"
bats-core = ">=1.11.0,<2"

[feature.dev.pypi-dependencies]
pip-audit = ">=2.7,<3"
build = ">=1.0,<2"
pdoc = ">=14.0,<15"

[feature.lint.dependencies]
ruff = ">=0.1.0,<1"
mypy = ">=1.8.0,<2"
yamllint = ">=1.35.0,<2"
pre-commit = ">=3.0,<5"
types-pyyaml = ">=6.0.12,<7"

[feature.lint.pypi-dependencies]
pip-audit = ">=2.7,<3"

[feature.lint.tasks]
# CVE-2026-3219: pip vendored library issue, no fix available we can pin
# CVE-2026-6357: pip 26.0.1 → 26.1 fix; pip is bundled by the runner Python
# and our deps don't pin it, so ignore until the runner ships a newer pip.
# CVE-2026-44431 / CVE-2026-44432: urllib3 2.6.3 → 2.7.0 fix; 2.7.0 is not yet
# packaged on conda-forge, so we can't bump until upstream publishes it.
# PYSEC-2025-183 (CVE-2025-45768): affects every pyjwt release (0.1.1-2.12.1) with
# no fixed version, and is disputed by the pyjwt maintainers — it concerns the key
# length chosen by the calling application, not a library defect. pyjwt is only a
# transitive dependency of pygithub (we never import it directly), so there is no
# version bump or code change that resolves it. Ignored as unfixable + disputed.
pip-audit = "pip-audit --ignore-vuln CVE-2026-3219 --ignore-vuln CVE-2026-6357 --ignore-vuln CVE-2026-44431 --ignore-vuln CVE-2026-44432 --ignore-vuln PYSEC-2025-183"

[environments]
default = { features = ["dev"], solve-group = "default" }
lint = { features = ["lint"], solve-group = "lint" }
