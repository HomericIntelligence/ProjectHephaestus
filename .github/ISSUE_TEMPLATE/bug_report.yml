name: Bug Report
description: File a bug report
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: Thanks for taking the time to fill out this bug report!
  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear and concise description of the bug.
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: Steps to reproduce the behavior.
      placeholder: |
        1. Import '...'
        2. Call '...'
        3. See error
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What you expected to happen.
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Python version, OS, hephaestus version.
      placeholder: |
        - Python: 3.10
        - OS: Ubuntu 22.04
        - hephaestus: 0.3.0
    validations:
      required: false
  - type: dropdown
    id: severity
    attributes:
      label: Severity
      description: >
        How impactful is this? Selecting a value auto-applies the matching
        `severity:*` label via the auto-label-severity workflow, feeding the
        Epic-and-children planning pipeline (see docs/ROADMAP.md). Audit-section
        tagging is handled by maintainers, not this form.
      options:
        - critical
        - major
        - minor
        - nitpick
    validations:
      required: false
  - type: input
    id: parent_epic
    attributes:
      label: Parent Epic (optional)
      description: >
        If this is a child of a tracked Epic (label `epic`), reference it as
        `#NNN`. Reference only — triage links it; not auto-consumed. Leave
        blank if unknown.
      placeholder: "#310"
    validations:
      required: false
  - type: markdown
    attributes:
      value: >
        ℹ️ On submit this issue is automatically labeled `state:needs-plan` (see
        [auto-label-needs-plan](https://github.com/mvillmow/ProjectHephaestus/blob/main/docs/auto-label-needs-plan.md));
        the planning pipeline picks it up next loop. You need not set any
        `state:*` label yourself.
