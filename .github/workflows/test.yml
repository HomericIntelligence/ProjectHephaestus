name: Test

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.sha }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v6

      - name: Install pixi
        uses: prefix-dev/setup-pixi@v0.9.5
        with:
          pixi-version: v0.63.2

      - name: Cache pixi environments
        uses: actions/cache@v5
        with:
          path: |
            .pixi
            ~/.cache/rattler/cache
          key: pixi-${{ runner.os }}-${{ hashFiles('pixi.lock') }}
          restore-keys: |
            pixi-${{ runner.os }}-

      - name: Lint check
        run: pixi run ruff check hephaestus scripts tests

      - name: Format check
        run: pixi run ruff format --check hephaestus scripts tests

      - name: Type check
        run: pixi run mypy

  test:
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest]
        python-version: ["3.10", "3.11", "3.12", "3.13"]
        test-type: [unit, integration]

    steps:
      - uses: actions/checkout@v6

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Cache pip packages
        uses: actions/cache@v5
        with:
          path: ~/.cache/pip
          key: pip-${{ runner.os }}-${{ matrix.python-version }}-${{ hashFiles('pyproject.toml') }}
          restore-keys: |
            pip-${{ runner.os }}-${{ matrix.python-version }}-

      - name: Install package
        run: pip install -e ".[dev]"

      - name: Run unit tests
        if: matrix.test-type == 'unit'
        run: pytest tests/unit --override-ini="addopts=" -v --strict-markers --cov=hephaestus --cov-report=term-missing --cov-report=xml --cov-fail-under=80
        shell: bash

      - name: Check unit test structure
        if: matrix.test-type == 'unit'
        run: python scripts/check_unit_test_structure.py

      - name: Run integration tests
        if: matrix.test-type == 'integration'
        run: |
          pytest tests/integration --override-ini="addopts=" -v --strict-markers

      - name: Build wheel smoke test
        if: matrix.test-type == 'integration'
        run: |
          python -m build
          pip install dist/homericintelligence_hephaestus-*.whl --force-reinstall
          python -c "import hephaestus; print('Package version:', hephaestus.__version__)"
          python -c "from hephaestus import slugify, retry_with_backoff, setup_logging; print('OK')"

      - name: Upload coverage
        if: matrix.test-type == 'unit' && matrix.python-version == '3.12'
        uses: codecov/codecov-action@v6
        with:
          files: ./coverage.xml
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: false
          flags: unit

  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v6

      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install pixi
        uses: prefix-dev/setup-pixi@v0.9.5
        with:
          pixi-version: v0.63.2

      - name: Cache pixi environments
        uses: actions/cache@v5
        with:
          path: |
            .pixi
            ~/.cache/rattler/cache
          key: pixi-${{ runner.os }}-3.12-${{ hashFiles('pixi.lock') }}
          restore-keys: |
            pixi-${{ runner.os }}-3.12-

      - name: Install package
        run: pixi run pip install -e .

      - name: Ruff lint check
        run: pixi run ruff check hephaestus/ tests/

      - name: Ruff format check
        run: pixi run ruff format --check hephaestus/ tests/

      - name: Mypy type check
        run: pixi run mypy hephaestus/
